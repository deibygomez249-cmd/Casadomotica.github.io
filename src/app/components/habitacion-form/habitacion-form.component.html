<div class="card shadow mt-4" style="max-width: 600px; margin: 0 auto;">
  <div class="card-header bg-primary text-white"><h3 class="mb-0">{{ id ? '✏️ Editar' : '➕ Nueva' }} Habitación</h3></div>
  <div class="card-body">
    <div class="mb-3"><label>Nombre de la Habitación</label><input [(ngModel)]="model.nombre" class="form-control" /></div>
    <div class="mb-3"><label>ID Casa Asociada</label><input type="number" [(ngModel)]="model.idCasa" class="form-control" /></div>
    <div class="d-flex gap-2">
      <button (click)="guardar()" class="btn btn-primary">💾 Guardar</button>
      <button (click)="router.navigate(['/habitaciones'])" class="btn btn-secondary">❌ Cancelar</button>
    </div>
  </div>
</div>
