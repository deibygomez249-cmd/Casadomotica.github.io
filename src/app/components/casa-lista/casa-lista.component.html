<div class="card shadow">
  <div class="card-header bg-primary text-white">
    <h3 class="mb-0">🏠 Gestión de Casas</h3>
  </div>
  <div class="card-body">
    
    <div class="d-flex justify-content-end mb-3">
      <a routerLink="/casas/nuevo" class="btn btn-success">➕ Nueva Casa</a>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Dirección</th>
            <th>Correo</th>
            <th>Usuario ID</th>
            <th class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of items">
            <td>{{ item.id }}</td>
            <td>{{ item.direccion }}</td>
            <td>{{ item.correo }}</td>
            <td>{{ item.idUsuario }}</td>
            <td class="text-center">
              <a [routerLink]="['/casas/editar', item.id]" class="btn btn-sm btn-primary me-1">✏️ Editar</a>
              <button (click)="eliminar(item.id!)" class="btn btn-sm btn-danger">🗑️ Eliminar</button>
            </td>
          </tr>
          <tr *ngIf="items.length === 0">
            <td colspan="5" class="text-center text-muted">No hay registros de casas</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
