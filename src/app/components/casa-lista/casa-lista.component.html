<div class="card shadow">
  <div class="card-header bg-primary text-white"><h3 class="mb-0">🏠 Gestión de Casas</h3></div>
  <div class="card-body">
    <div class="text-end mb-3"><a routerLink="/casas/nuevo" class="btn btn-success">➕ Nueva Casa</a></div>
    <table class="table table-hover align-middle">
      <thead class="table-dark"><tr><th>ID</th><th>Dirección</th><th>Ciudad</th><th>Id Usuario</th><th class="text-center">Acciones</th></tr></thead>
      <tbody>
        
        <tr *ngFor="let e of items">
          <td>{{ e.idCasa }}</td>
          <td>{{ e.direccion }}</td>
          <td>{{ e.ciudad }}</td>
          <td>{{ e.idUsuario }}</td>
          <td class="text-center">
            <a [routerLink]="['/casas/editar', e.idCasa]" class="btn btn-sm btn-primary me-1">✏️</a>
            <button (click)="eliminar(e.idCasa)" class="btn btn-sm btn-danger">🗑️</button>
          </td>
        </tr>
        <tr *ngIf="items.length === 0"><td colspan="5" class="text-center text-muted">No hay registros de casas</td></tr>
      </tbody>
    </table>
  </div>
</div>
