<div class="card shadow">
  <div class="card-header bg-primary text-white">
    <h3 class="mb-0">{{ id ? '✏️ Editar' : '➕ Nueva' }} Casa</h3>
  </div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Dirección</label>
        <input [(ngModel)]="model.direccion" class="form-control" />
      </div>
      <div class="col-md-6 mb-3">
        <label>Correo</label>
        <input [(ngModel)]="model.correo" class="form-control" type="email" />
      </div>
      <div class="col-md-6 mb-3">
        <label>Teléfono Fijo</label>
        <input [(ngModel)]="model.telefonoFijo" class="form-control" />
      </div>
      <div class="col-md-6 mb-3">
        <label>Número de Habitaciones</label>
        <input [(ngModel)]="model.numerohabitaciones" type="number" class="form-control" />
      </div>
      <div class="col-md-6 mb-3">
        <label>Metros Cuadrados</label>
        <input [(ngModel)]="model.metrosCuadrados" type="number" step="0.01" class="form-control" />
      </div>
      <div class="col-md-6 mb-3">
        <label>ID Usuario (Dueño)</label>
        <input [(ngModel)]="model.idUsuario" type="number" class="form-control" />
      </div>
    </div>
    <div class="d-flex gap-2">
      <button (click)="guardar()" class="btn btn-primary">💾 Guardar</button>
      <button (click)="router.navigate(['/casas'])" class="btn btn-secondary">❌ Cancelar</button>
    </div>
  </div>
</div>
