<div class="card shadow">
  <div class="card-header bg-primary text-white">
    <h3 class="mb-0">🏷️ Tipos de Usuario</h3>
  </div>
  <div class="card-body">
    
    <!-- Solo botón nuevo tipo -->
    <div class="d-flex justify-content-end mb-3">
      <a routerLink="/tipos-usuario/nuevo" class="btn btn-success">➕ Nuevo Tipo</a>
    </div>

    <!-- Tabla de datos -->
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Tipo de Usuario</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of items">
            <td>{{ item.id }}</td>
            <td>{{ item.tipoUsuario }}</td>
            <td>
              <a [routerLink]="['/tipos-usuario/editar', item.id]" class="btn btn-sm btn-primary me-1">✏️ Editar</a>
              <button (click)="eliminar(item.id)" class="btn btn-sm btn-danger">🗑️ Eliminar</button>
            </td>
          </tr>
          <tr *ngIf="items.length === 0">
            <td colspan="3" class="text-center text-muted">No hay tipos de usuario registrados</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
