<div class="card shadow">
  <div class="card-header bg-primary text-white"><h3>{{ id ? '✏️ Editar' : '➕ Nueva' }} Lectura Sensor</h3></div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-6 mb-3"><label>Valor</label><input [(ngModel)]="model.valor" type="number" step="0.01" class="form-control" /></div>
      <div class="col-md-6 mb-3"><label>Fecha/Hora</label><input [(ngModel)]="model.fechaLectura" type="datetime-local" class="form-control" /></div>
      <div class="col-md-6 mb-3"><label>Notas</label><input [(ngModel)]="model.notas" class="form-control" /></div>
      <div class="col-md-6 mb-3"><label>ID Sensor</label><input [(ngModel)]="model.idSensor" type="number" class="form-control" /></div>
    </div>
    <div class="d-flex gap-2"><button (click)="guardar()" class="btn btn-primary">💾 Guardar</button>
      <button (click)="router.navigate(['/lecturas-sensores'])" class="btn btn-secondary">❌ Cancelar</button></div>
  </div>
</div>
