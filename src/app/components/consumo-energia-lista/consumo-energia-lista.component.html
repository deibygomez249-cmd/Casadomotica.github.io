<div class="card shadow">
  <div class="card-header bg-primary text-white"><h3 class="mb-0">⚡ Consumos de Energía</h3></div>
  <div class="card-body">
    <div class="text-end mb-3"><a routerLink="/consumos-energia/nuevo" class="btn btn-success">➕ Nuevo Consumo</a></div>
    <div class="table-responsive">
      <table class="table table-hover">
        <thead>
          <tr><th>ID</th><th>Dispositivo</th><th>Inicio</th><th>Fin</th><th>Consumo (kWh)</th><th>Costo</th><th>Acciones</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of items">
            <td>{{ c.id }}</td>
            <td>{{ c.idDispositivo }}</td>
            <td>{{ c.fechaHoraInicio | date:'short' }}</td>
            <td>{{ c.fechaHoraFin | date:'short' }}</td>
            <td>{{ c.consumoKWh }}</td>
            <td>{{ c.costoEstimado | currency }}</td>
            <td>
              <a [routerLink]="['/consumos-energia/editar', c.id]" class="btn btn-sm btn-primary me-1">✏️</a>
              <button (click)="eliminar(c.id!)" class="btn btn-sm btn-danger">🗑️</button>
            </td>
          </tr>
          <tr *ngIf="items.length === 0"><td colspan="7">No hay consumos registrados</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
