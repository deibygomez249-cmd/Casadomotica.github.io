<div class="card shadow">
  <div class="card-header bg-primary text-white">
    <h3 class="mb-0">📊 Lecturas de Sensores</h3>
  </div>
  <div class="card-body">
    
    <div class="d-flex justify-content-end mb-3">
      <a routerLink="/lecturas-sensores/nuevo" class="btn btn-success">➕ Nueva Lectura</a>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Sensor</th>
            <th>Valor</th>
            <th>Fecha</th>
            <th>Notas</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of items">
            <td>{{ item.id }}</td>
            <td>{{ item.idSensor }}</td>
            <td>{{ item.valor }}</td>
            <td>{{ item.fechaLectura | date:'short' }}</td>
            <td>{{ item.notas || '-' }}</td>
            <td>
              <a [routerLink]="['/lecturas-sensores/editar', item.id]" class="btn btn-sm btn-primary me-1">✏️ Editar</a>
              <button (click)="eliminar(item.id!)" class="btn btn-sm btn-danger">🗑️ Eliminar</button>
            </td>
          </tr>
          <tr *ngIf="items.length === 0">
            <td colspan="6" class="text-center text-muted">No hay lecturas registradas</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
