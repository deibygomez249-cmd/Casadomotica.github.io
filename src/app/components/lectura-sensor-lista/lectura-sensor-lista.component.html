<div class="card shadow">
  <div class="card-header bg-primary text-white"><h3 class="mb-0">📊 Lecturas de Sensores</h3></div>
  <div class="card-body">
    <div class="text-end mb-3"><a routerLink="/lecturas-sensores/nuevo" class="btn btn-success">➕ Nueva Lectura</a></div>
    <table class="table table-hover">
      <thead><tr><th>ID</th><th>Sensor</th><th>Valor</th><th>Fecha</th><th>Notas</th><th>Acciones</th></tr></thead>
      <tbody>
        <tr *ngFor="let l of items"><td>{{ l.id }}</td><td>{{ l.idSensor }}</td><td>{{ l.valor }}</td>
          <td>{{ l.fechaLectura | date:'short' }}</td><td>{{ l.notas }}</td>
          <td><a [routerLink]="['/lecturas-sensores/editar', l.id]" class="btn btn-sm btn-primary me-1">✏️</a>
            <button (click)="eliminar(l.id!)" class="btn btn-sm btn-danger">🗑️</button></td>
        </tr>
        <tr *ngIf="items.length === 0"><td colspan="6">No hay lecturas</td></tr>
      </tbody>
    </table>
  </div>
</div>
