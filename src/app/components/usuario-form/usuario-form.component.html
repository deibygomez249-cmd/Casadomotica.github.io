<div class="card shadow">
  <div class="card-header bg-primary text-white">
    <h3 class="mb-0">{{ id ? '✏️ Editar' : '➕ Nuevo' }} Usuario</h3>
  </div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label>Nombre Completo</label>
        <input [(ngModel)]="model.NombreCompleto" class="form-control" />
      </div>
      <div class="col-md-6 mb-3">
        <label>Correo Electrónico</label>
        <input [(ngModel)]="model.Email" class="form-control" type="email" />
      </div>
      <div class="col-md-6 mb-3">
        <label>Contraseña</label>
        <input [(ngModel)]="model.ContrasenaHash" type="password" class="form-control" />
      </div>
      <div class="col-md-6 mb-3">
        <label>Teléfono</label>
        <input [(ngModel)]="model.Telefono" class="form-control" />
      </div>
    </div>
    <div class="d-flex gap-2">
      <button (click)="guardar()" class="btn btn-primary">💾 Guardar</button>
      <button (click)="router.navigate(['/usuarios'])" class="btn btn-secondary">❌ Cancelar</button>
    </div>
  </div>
</div>
