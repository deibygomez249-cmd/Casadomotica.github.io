<div class="card shadow">
  <div class="card-header bg-primary text-white"><h3>{{ id ? '✏️ Editar' : '➕ Nuevo' }} Sensor</h3></div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-6 mb-3"><label>Nombre</label><input [(ngModel)]="model.nombre" class="form-control" /></div>
      <div class="col-md-6 mb-3"><label>Tipo</label><input [(ngModel)]="model.tipoSensor" class="form-control" /></div>
      <div class="col-md-6 mb-3"><label>Unidad Medida</label><input [(ngModel)]="model.unidadMedida" class="form-control" /></div>
      <div class="col-md-6 mb-3"><label>ID Habitación</label><input [(ngModel)]="model.idHabitacion" type="number" class="form-control" /></div>
    </div>
    <div class="d-flex gap-2"><button (click)="guardar()" class="btn btn-primary">💾 Guardar</button>
      <button (click)="router.navigate(['/sensores'])" class="btn btn-secondary">❌ Cancelar</button></div>
  </div>
</div>
