<div class="card shadow">
  <div class="card-header bg-primary text-white"><h3 class="mb-0">{{ id ? '✏️ Editar' : '➕ Nuevo' }} Tipo</h3></div>
  <div class="card-body">
    <div class="mb-3"><label>Tipo de Usuario</label><input [(ngModel)]="model.tipoUsuario" class="form-control" /></div>
    <div class="d-flex gap-2"><button (click)="guardar()" class="btn btn-primary">💾 Guardar</button>
      <button (click)="router.navigate(['/tipos-usuario'])" class="btn btn-secondary">❌ Cancelar</button></div>
  </div>
</div>
