<div class="card shadow">
  <div class="card-header bg-primary text-white"><h3 class="mb-0">🏷️ Habitaciones</h3></div>
  <div class="card-body">
    <div class="text-end mb-3"><a routerLink="/habitacion/nuevo" class="btn btn-success">➕ Nueva Habitacion</a></div>
    <table class="table table-hover">
      <thead><tr><th>ID</th><th>Nombre</th><th>Acciones</th></tr></thead>
      <tbody>
        <tr *ngFor="let e of items">
          <td>{{ e.id }}</td>
          <td>{{ e.nombre }}</td>
          <td>
            <a [routerLink]="['/habitacion/editar', e.id]" class="btn btn-sm btn-primary me-1">✏️</a>
            <button (click)="eliminar(e.id!)" class="btn btn-sm btn-danger">🗑️</button>
          </td>
        </tr>
        <tr *ngIf="items.length === 0"><td colspan="3">No hay registros</td></tr>
      </tbody>
    </table>
  </div>
</div>
